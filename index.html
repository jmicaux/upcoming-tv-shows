<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lineup — Upcoming US Shows</title>
  <meta name="description" content="Lineup lists upcoming US TV and streaming premieres month by month. Browse every network and platform, follow the ones you care about, and filter by genre.">
  <meta name="robots" content="index, follow">

  <!-- Theme -->
  <meta name="theme-color" content="#0f1115" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f4f5f7" media="(prefers-color-scheme: light)">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23e50914'/%3E%3Ctext x='50' y='72' font-size='64' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'%3EL%3C/text%3E%3C/svg%3E">

  <!-- Social sharing (set og:url + og:image once you have a domain) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Lineup">
  <meta property="og:title" content="Lineup — Upcoming US Shows">
  <meta property="og:description" content="Upcoming US TV and streaming premieres, month by month. Follow your networks and platforms, filter by genre.">
  <meta property="og:locale" content="en_US">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Lineup — Upcoming US Shows">
  <meta name="twitter:description" content="Upcoming US TV and streaming premieres, month by month.">

  <!-- Canonical: replace with the real URL once deployed -->
  <!-- <link rel="canonical" href="https://your-domain.example/"> -->

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Lineup",
    "description": "Upcoming US TV and streaming premieres, month by month.",
    "applicationCategory": "EntertainmentApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <noscript>
    <p style="padding:1rem;text-align:center">Lineup needs JavaScript to load the upcoming US TV and streaming schedule from TVMaze.</p>
  </noscript>
  <header class="topbar">
    <h1 class="brand">Lineup <span class="brand-sub">Upcoming US Shows</span></h1>
    <nav class="month-nav">
      <button id="prevMonth" aria-label="Previous month">‹</button>
      <span id="monthLabel" class="month-label"></span>
      <button id="nextMonth" aria-label="Next month">›</button>
      <button id="todayBtn" class="today-btn">Today</button>
      <button id="themeBtn" class="theme-btn" aria-label="Toggle theme"></button>
    </nav>
  </header>

  <section class="filters">
    <div class="field dropdown" id="networkDropdown">
      <span class="field-label">Networks</span>
      <button type="button" id="networkBtn" class="dropdown-btn">All <span id="networkBtnCount" class="pill"></span> ▾</button>
      <div id="networkPanel" class="dropdown-panel" hidden>
        <div class="dropdown-actions">
          <input type="search" id="networkSearch" placeholder="Filter list…" autocomplete="off">
          <button type="button" id="networkClear">Show all</button>
        </div>
        <div id="networkList" class="network-list"></div>
      </div>
    </div>
    <label>
      Genre
      <select id="genreFilter"><option value="">All</option></select>
    </label>
    <label class="switch">
      <input type="checkbox" id="premieresOnly" checked>
      Premieres only
    </label>
    <span id="resultCount" class="result-count"></span>
  </section>

  <div id="progress" class="progress" hidden>
    <div id="progressBar" class="progress-bar"></div>
    <span id="progressText" class="progress-text"></span>
  </div>

  <main id="grid" class="grid" aria-live="polite"></main>

  <div id="modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <article class="modal-card" role="dialog" aria-modal="true">
      <button class="modal-close" data-close aria-label="Fermer">×</button>
      <div id="modalBody"></div>
    </article>
  </div>

  <script src="app.js"></script>
</body>
</html>
