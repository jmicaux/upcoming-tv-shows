<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lineup — Upcoming TV Shows</title>
  <meta name="description" content="Lineup lists upcoming TV and streaming premieres month by month. Browse networks and platforms — US plus Canal+ and Arte — follow the ones you care about, and filter by genre.">
  <meta name="robots" content="noindex, nofollow">

  <!-- Theme -->
  <meta name="theme-color" content="#0f1115" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f4f5f7" media="(prefers-color-scheme: light)">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23e50914'/%3E%3Ctext x='50' y='72' font-size='64' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'%3EL%3C/text%3E%3C/svg%3E">

  <!-- Social sharing (set og:url + og:image once you have a domain) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Lineup">
  <meta property="og:title" content="Lineup — Upcoming TV Shows">
  <meta property="og:description" content="Upcoming TV and streaming premieres, month by month. Follow your networks and platforms, filter by genre.">
  <meta property="og:locale" content="en_US">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Lineup — Upcoming TV Shows">
  <meta name="twitter:description" content="Upcoming TV and streaming premieres, month by month.">

  <!-- Canonical: replace with the real URL once deployed -->
  <!-- <link rel="canonical" href="https://your-domain.example/"> -->

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Lineup",
    "description": "Upcoming TV and streaming premieres, month by month.",
    "applicationCategory": "EntertainmentApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>

  <link rel="stylesheet" href="styles.css?v=1.7.1">
</head>
<body>
  <noscript>
    <p style="padding:1rem;text-align:center">Lineup needs JavaScript to load the upcoming TV and streaming schedule.</p>
  </noscript>
  <header class="topbar">
    <h1 class="brand">Lineup <span class="brand-sub">Upcoming TV Shows</span> <span class="brand-ver" id="appVersion"></span></h1>
    <div class="actions">
      <button id="viewBtn" class="view-btn"></button>
      <button id="exportBtn" class="icon-btn" title="Export preferences" aria-label="Export preferences">⭳</button>
      <button id="importBtn" class="icon-btn" title="Import preferences" aria-label="Import preferences">⭱</button>
      <input id="importFile" type="file" accept="application/json" hidden>
      <button id="settingsBtn" class="icon-btn" title="Watch settings" aria-label="Watch settings">⚙</button>
      <button id="themeBtn" class="theme-btn" aria-label="Toggle theme"></button>
    </div>
  </header>

  <section class="filters">
    <div class="field dropdown" id="networkDropdown">
      <span class="field-label">Networks</span>
      <button type="button" id="networkBtn" class="dropdown-btn" aria-haspopup="true" aria-expanded="false">All <span id="networkBtnCount" class="pill"></span> ▾</button>
      <div id="networkPanel" class="dropdown-panel" hidden>
        <div class="dropdown-actions">
          <input type="search" id="networkSearch" placeholder="Filter list…" aria-label="Filter channel list" autocomplete="off">
          <button type="button" id="networkClear">Show all</button>
        </div>
        <div id="networkList" class="network-list"></div>
      </div>
    </div>
    <label>
      Genre
      <select id="genreFilter"><option value="">All</option></select>
    </label>
    <label>
      Search
      <input type="search" id="searchInput" placeholder="Show title…" autocomplete="off">
    </label>
    <label class="switch">
      <input type="checkbox" id="premieresOnly" checked>
      Premieres only
    </label>
    <button type="button" id="resetFilters" class="reset-btn">Reset filters</button>
    <span id="resultCount" class="result-count" role="status" aria-live="polite"></span>
  </section>

  <main id="grid" class="grid"></main>

  <div id="modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <article class="modal-card" role="dialog" aria-modal="true" tabindex="-1">
      <button class="modal-close" data-close aria-label="Close">×</button>
      <div id="modalBody"></div>
    </article>
  </div>

  <script src="config.js"></script>
  <script src="app.js?v=1.7.1"></script>
</body>
</html>
